# Voice-bot runtime configuration.
#
# Swap providers/models here without touching code. Secrets stay in .env;
# this file references them by name (e.g. `api_key_env: DEEPSEEK_API_KEY`).
#
# Used by voice_bot.build_components() and tools._describe_image().

llm:
  # OpenAI-compatible chat completions endpoint. Anything that speaks the
  # OpenAI v1 chat schema works here — DeepSeek, Kimi/Moonshot, OpenAI itself.
  provider: deepseek
  base_url: https://api.deepseek.com/v1
  model: deepseek-v4-flash
  api_key_env: DEEPSEEK_API_KEY
  # Provider-specific extras merged into every completion call. For DeepSeek,
  # `thinking: disabled` skips the reasoning pass — required for voice latency.
  extra:
    extra_body:
      thinking:
        type: disabled

stt:
  provider: soniox
  api_key_env: SONIOX_API_KEY
  language_hints: [en, es, ja, zh]

tts:
  provider: soniox
  api_key_env: SONIOX_API_KEY
  voice: Mina   # Females: Maya, Nina, Emma, Claire, Grace, Mina.
                # Males:   Daniel, Noah, Jack, Adrian, Owen, Kenji.
  # When true, TTS starts speaking at clause boundaries (,;:—) instead of
  # waiting for whole sentences. Cuts first-audio latency on long answers
  # by ~200–400ms at the cost of slightly choppier mid-sentence prosody.
  # Watch the `⏱  text→audio` line from the latency tracer to A/B it.
  stream_clauses: false
  clause_min_words: 3

# Vision describer chain for take_screenshot / capture_webcam.
# A list of providers tried in order — first one that returns text wins.
# A provider is skipped if its api_key_env is set but unset in env, or if its
# call raises any error (timeout, 503, model crash, overload). Set to an empty
# list `[]` or remove the key to disable vision entirely.
#
# Each entry must speak the OpenAI image_url content-block format.
# DeepSeek's hosted chat API does not — verified empirically.
# Kimi/Moonshot's `moonshot-v1-*-vision-preview` models do.
# LM Studio works for any model that has a vision projector loaded
# (e.g. Qwen2.5-VL-*-Instruct, Gemma-3-*-IT-VL). gemma-4-e2b/e4b are TEXT-ONLY
# and crash on image input.
vision:
  # Primary: in-process MLX. Loads from ~/.cache/huggingface (auto-downloads
  # the first time). No LM Studio, no HTTP, no rate limits. Apple-Silicon-only.
  # Other small picks for `model:`:
  #   mlx-community/Qwen3-VL-4B-Instruct-4bit       (better quality, ~3GB)
  #   mlx-community/Qwen2.5-VL-3B-Instruct-4bit     (proven, ~2GB)
  #   mlx-community/Qwen2-VL-2B-Instruct-4bit       (smallest, fastest)
  - name: mlx-local
    kind: mlx
    model: mlx-community/Qwen3-VL-2B-Instruct-4bit
    max_tokens: 150
    max_image_width: 1024
    brevity_suffix: "Reply in at most two short sentences."

  # Fallback: Kimi/Moonshot vision via kimi-k2.6 (a reasoning model).
  # Empirically faster than moonshot-v1-*-vision-preview and currently more
  # available (the v1-vision-preview line keeps 429-ing under load).
  # Note: k2.6 is a reasoning model — answers may arrive in `reasoning_content`
  # rather than `content`. The code in tools._try_describe_with handles both.
  - name: kimi
    kind: openai
    base_url: https://api.moonshot.cn/v1
    model: kimi-k2.6
    api_key_env: MOONSHOT_API_KEY
    # Reasoning models burn output tokens on internal chain-of-thought before
    # producing visible content. Give them headroom.
    max_tokens: 400
    max_image_width: 1280
    brevity_suffix: "Reply with ONLY the final answer, in at most two short sentences for spoken delivery. Do not include reasoning, planning, or alternative phrasings."
    timeout: 60.0

# ShortCat command-palette driver — label-based UI navigation as a faster,
# more reliable alternative to pixel-coordinate clicks. See ADR-0005.
# Requires the Shortcat.app (https://shortcat.app/) installed and granted
# Accessibility permission. Set the activation hotkey here to match what you
# configured in ShortCat preferences (default ⌘⌥Space, since ⌘⇧Space conflicts
# with Spotlight).
shortcat:
  enabled: true
  hotkey: "cmd+alt+space"
  palette_delay_ms: 250
  settle_ms: 400

# Wake word — when enabled, the agent ignores all transcripts until it hears
# `phrase`. On wake, it speaks `ack_text`, then behaves normally until either
# `sleep_phrase` is heard or no user speech arrives for `idle_timeout_seconds`.
# Set `start_awake: false` to require the wake word for the very first turn.
wake_word:
  enabled: true
  phrase: "Hey Ava"
  sleep_phrase: "Go to sleep"
  # Time of silence after the bot finishes speaking before going to sleep.
  # The timer is paused while the bot is talking, so this counts only quiet
  # time on the user's side.
  idle_timeout_seconds: 60
  ack_text: "Ready."
  sleep_ack_text: "Sleeping."
  start_awake: true

# Conversation pacing — the dials you reach for when the bot feels too eager
# (cuts you off) or too sluggish (long awkward pauses).
turn:
  # How long the bot waits after you stop talking before deciding your turn
  # is over and sending to the LLM. Lower = snappier; too low = bot interrupts
  # your hesitation pauses.
  user_speech_timeout: 0.6
  # How long the EchoSuppressor keeps dropping STT frames after the bot stops
  # speaking. Compensates for speaker-bleed-into-mic without hardware AEC.
  # Raise if the bot keeps "hearing itself"; lower if it ignores you for too
  # long after it finishes a sentence.
  echo_holdoff_seconds: 1.0
  # When true, use Pipecat's smart-turn-v3 ONNX endpointer model instead of a
  # fixed silence timeout. The model predicts whether the user is *done* (vs.
  # mid-thought), cutting ~300–500ms of dead air on definite-end utterances.
  # Requires:  pip install 'pipecat-ai[local-smart-turn]'
  # On any load/import failure, the bot logs a warning and stays on the
  # speech-timeout strategy — it never silently breaks.
  smart_turn_enabled: false
  # How long to wait for both Soniox WebSockets (STT + TTS) to come up
  # before logging which side failed. Without this the bot can hang
  # forever silently on a bad API key. Set to 0 to disable.
  connection_timeout_seconds: 15.0

# Global desktop hotkeys. Uses pynput combo syntax. Requires macOS
# Accessibility permission on first run.
hotkey:
  # Press anywhere to interrupt the bot mid-sentence. Examples:
  #   "<cmd>+<shift>+i"   ⌘⇧I (default)
  #   "<ctrl>+<alt>+i"    ⌃⌥I
  interrupt: "<cmd>+<shift>+i"

# Computer-use actuation backend — picks the engine behind click_at,
# type_text, press_key, scroll, mouse_move.
#
#   native  pyautogui. Default. Works everywhere; steals cursor/focus.
#   cua     trycua/cua's `cua-driver` (Swift MCP server). Drives macOS
#           without stealing cursor or focus. One-time install:
#             brew tap trycua/cua && brew install cua-driver
#           Verify: `which cua-driver`
#
# If `backend: cua` is set but the binary isn't on PATH or the handshake
# fails, the tools log a warning and silently fall back to native — the
# bot stays usable. Call the `cua_status` tool to check connectivity.
computer_use:
  backend: native           # native | cua
  cua_binary: cua-driver    # name on PATH, or absolute path
  cua_timeout: 10.0         # seconds per cua-driver RPC

# Persistent memory backend. `file` (default) stores entries in
# .voice-agent/memories/{USER.md, MEMORY.md} on disk. `agentmemory` points
# at a self-hosted rohitg00/agentmemory instance over WebSocket via the iii
# SDK so the same durable memory is shared with Claude Code, Cursor, Codex,
# OpenCode, etc. Requires `pip install iii-sdk` and a running iii service.
memory:
  backend: file              # file | agentmemory
  agentmemory:
    ws_url: ws://localhost:49134
    project_user: voice-agent-user
    project_memory: voice-agent-memory
    timeout: 10.0

# TokenJuice — compress tool results before they reach the LLM. Strips HTML,
# shortens long URLs, removes control chars, collapses whitespace. See
# tools/compression.py. Reductions are logged at debug level and to the
# session log (bytes_before / bytes_after on every tool-result event), so
# you can measure the win per tool.
tool_compression:
  enabled: true
  strip_html: true
  shorten_urls: true
  url_max_chars: 80         # URLs longer than this are truncated with '…'
  collapse_whitespace: true
  strip_control: true
  max_chars: 0              # 0 = unlimited; otherwise hard-cap per result

# External agents — connect the voice bot to other LLMs and coding agents so
# it can ask them questions or delegate long-running tasks. See
# tools/external_agents.py for details on each tool. Three tiers:
#
#   consult: blocking "ask another model" calls — second opinions, harder
#            reasoning, alternative voices. Returns text within ~10s.
#   coding:  fire-and-forget CLI agents (Claude Code, Codex, Gemini CLI).
#            Returns a task_id immediately; check progress with get_agent_task.
#   hermes:  peer agent over HTTP (your local Hermes instance).
#
# Missing API keys or missing binaries don't crash the bot — the tool stays
# registered and returns a useful error string when called. Same pattern as
# the vision chain.
agents:
  # Hard cap on concurrent background coding agents. Set to 0 to disable.
  # When the cap is reached, spawn_* tools refuse with an instructive error.
  max_concurrent: 3

  # Each entry under consult: becomes an `ask_<key>` tool. Add a new model
  # by adding a new key — no Python edits needed. Optional `description`
  # and `speak_text` are surfaced to the LLM verbatim; sensible defaults
  # are generated from the key/model if omitted.
  consult:
    kimi:
      name: Kimi
      base_url: https://api.moonshot.cn/v1
      model: kimi-k2.6
      api_key_env: MOONSHOT_API_KEY
      timeout: 60.0
    deepseek_reasoner:
      name: DeepSeek Reasoner
      base_url: https://api.deepseek.com/v1
      model: deepseek-reasoner
      api_key_env: DEEPSEEK_API_KEY
      timeout: 120.0
      speak_text: Let me think harder on that.
      # DeepSeek's thinking is ON for this consult tool — that's the whole
      # point (voice path uses thinking=disabled for latency).
      extra:
        extra_body:
          thinking:
            type: enabled
    gemini:
      name: Gemini
      # Gemini's OpenAI-compatible endpoint. Drop in the API key as
      # GEMINI_API_KEY (works with AI Studio keys).
      base_url: https://generativelanguage.googleapis.com/v1beta/openai
      model: gemini-3-pro
      api_key_env: GEMINI_API_KEY
      timeout: 60.0

  coding:
    claude_code:
      bin: claude
      # `claude -p <task>` runs in print mode — single-shot, prints to stdout,
      # exits. Drop --output-format json/stream-json here if you want
      # structured output.
      default_args: ["-p"]
      task_as_arg: true
    codex:
      bin: codex
      default_args: ["exec"]
      task_as_arg: true
    gemini_cli:
      bin: gemini
      default_args: ["-p"]
      task_as_arg: true

  # Hermes peer — set base_url to wherever your local Hermes is bound.
  # Speaks an OpenAI-compatible chat schema; `spawn_path` is the
  # POST endpoint for long-running tasks (consult Hermes docs for the
  # exact path on your install).
  hermes:
    base_url: http://localhost:8000
    model: hermes
    api_key_env: HERMES_API_KEY
    spawn_path: /tasks
    timeout: 60.0

# System prompt the LLM sees at conversation start. Swap freely.
system_prompt: |
  You are a friendly multimodal voice assistant.
  Your output will be spoken aloud — keep answers brief, conversational,
  and free of markdown or special characters.
  You can call tools to interact with the user's machine when useful.
  Use them only when the user's request actually needs them.
  When the conversation starts, say exactly "Hi, I'm here." and stop —
  do not introduce yourself, do not list capabilities, just wait for the user.
